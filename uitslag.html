<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Het Dossier</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗄️</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Abril+Fatface&display=swap" rel="stylesheet">
<style>
:root{--nacht:#06090d;--groen:#3ddc84;--paars:#d97bb2;--amber:#ffb347;--papier:#d8d2c4;--grijs:#77828a;--rood:#ff8f8f}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--nacht);color:var(--papier);font-family:'Special Elite',monospace;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem 4rem}
.dossier{max-width:42rem;width:100%;background:linear-gradient(175deg,#10151b,#0b1015);border:1px solid #223039;padding:2.5rem 2rem;position:relative}
.dossier::before{content:"";position:absolute;inset:10px;border:1px dashed #2c3d47;pointer-events:none}
h1{font-family:'Abril Fatface',serif;font-weight:400;font-size:1.7rem;color:#e9e2d0;margin-bottom:.3rem}
h2{font-size:.85rem;letter-spacing:.15em;text-transform:uppercase;color:var(--amber);margin:2.4rem 0 1rem;border-bottom:1px dashed #2c3d47;padding-bottom:.5rem}
.sub{font-size:.8rem;letter-spacing:.15em;text-transform:uppercase;color:var(--grijs);margin-bottom:2rem}
input{width:100%;background:#0a0f14;border:1px solid #24333d;color:#ece5d3;font-family:inherit;font-size:1.05rem;padding:.9em;outline:none;margin-bottom:1rem;letter-spacing:.2em}
button{width:100%;padding:1em;background:#1d6b47;border:1px solid #1d6b47;color:#eafff3;font-family:inherit;font-size:.95rem;letter-spacing:.14em;text-transform:uppercase;cursor:pointer}
button:hover{filter:brightness(1.25)}
.fout{color:var(--rood);font-size:.85rem;margin-top:1rem;display:none}
#resultaten{display:none}
.balkrij{margin-bottom:1.8rem}
.balkrij .kop{display:flex;justify-content:space-between;font-size:.92rem;margin-bottom:.4rem}
.balkrij .kop b{font-weight:400;color:#ece5d3}
.balkrij .kop span{color:var(--amber)}
.balk{height:14px;background:#0a0f14;border:1px solid #24333d}
.balk i{display:block;height:100%;transition:width 1s ease}
.versus .balk i{background:var(--groen)}
.mix .balk i{background:var(--paars)}
.supporter .balk i{background:var(--amber)}
.namen{font-size:.78rem;color:var(--grijs);margin-top:.5rem;line-height:1.7}
.kaartje{border:1px solid #24333d;background:#0d1319;padding:.8rem .95rem;margin-bottom:.7rem;font-size:.85rem;line-height:1.7}
.kaartje .kop2{color:#ece5d3}
.kaartje .meta{color:var(--grijs);font-size:.75rem}
.kaartje.alarm{border-color:#6e3333}
.kaartje.alarm .kop2{color:var(--rood)}
.zeur{border-left:2px solid var(--amber);padding-left:.8rem;margin-bottom:.9rem;font-size:.85rem;line-height:1.6}
.zeur .wie{color:var(--amber)}
.zeur .wat{color:#cfc8b8;font-style:italic}
.zeur .meta{color:var(--grijs);font-size:.72rem}
.leeg{color:var(--grijs);font-size:.9rem;text-align:center;padding:1rem 0}
.totaal{text-align:center;font-size:.85rem;color:var(--grijs);margin-top:2rem;border-top:1px dashed #2c3d47;padding-top:1.2rem}
</style>
</head>
<body>
<div class="dossier">
  <h1>Het Dossier 🗄️</h1>
  <p class="sub">Enkel voor het opperjurylid — Communiqué №1</p>

  <div id="slot">
    <input id="code" type="password" placeholder="TOEGANGSCODE" onkeydown="if(event.key==='Enter')openDossier()">
    <button onclick="openDossier()">Open het dossier</button>
    <p class="fout" id="fout">De jury kent u niet. Verdwijn.</p>
  </div>

  <div id="resultaten">
    <div class="balkrij versus">
      <div class="kop"><b>⚔️ Baroudellen versus Baroudeurs</b><span id="n-versus">0</span></div>
      <div class="balk"><i id="b-versus" style="width:0"></i></div>
      <p class="namen" id="l-versus"></p>
    </div>
    <div class="balkrij mix">
      <div class="kop"><b>🤝 Mix Baroudellen / Baroudeurs</b><span id="n-mix">0</span></div>
      <div class="balk"><i id="b-mix" style="width:0"></i></div>
      <p class="namen" id="l-mix"></p>
    </div>
    <div class="balkrij supporter">
      <div class="kop"><b>📣 Baroudellen als supporters</b><span id="n-supporter">0</span></div>
      <div class="balk"><i id="b-supporter" style="width:0"></i></div>
      <p class="namen" id="l-supporter"></p>
    </div>

    <h2>🕵️ Verdachte praktijken</h2>
    <div id="verdacht"></div>

    <h2>📍 Herkomst der verklaringen</h2>
    <div id="herkomst"></div>

    <h2>😤 Het gezeur (toevoegingen aan het dossier)</h2>
    <div id="gezeur"></div>

    <p class="totaal" id="totaal"></p>
  </div>
</div>

<script>
const SUPA_URL = 'https://uvodxrrxsxnjlinqrjlw.supabase.co';
const SUPA_KEY = 'sb_publishable_is9JHVr3f7hRfZh31WtLvA_sz5ymhQW';
const KEUZES = { versus: '⚔️ versus', mix: '🤝 mix', supporter: '📣 supporter' };

function esc(t) { return (t == null ? '' : String(t)).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toestelNaam(ua) {
  if (!ua) return 'onbekend toestel';
  if (/iPhone/.test(ua)) return 'iPhone';
  if (/iPad/.test(ua)) return 'iPad';
  if (/Android/.test(ua)) return 'Android-gsm';
  if (/Macintosh/.test(ua)) return 'Mac';
  if (/Windows/.test(ua)) return 'Windows-pc';
  return 'onbekend toestel';
}
function tijd(t) { return new Date(t).toLocaleString('nl-BE', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' }); }
// Café Den Hert, Oever 13 (Vaart-Noord), Bellem
const CAFE = { lat: 51.09733, lon: 3.49797 };
function afstand(lat, lon) {
  const R = 6371000, r = Math.PI / 180;
  const dLat = (lat - CAFE.lat) * r, dLon = (lon - CAFE.lon) * r;
  const a = Math.sin(dLat/2)**2 + Math.cos(CAFE.lat*r) * Math.cos(lat*r) * Math.sin(dLon/2)**2;
  const m = 2 * R * Math.asin(Math.sqrt(a));
  return m < 1000 ? Math.round(m) + ' m' : (m/1000).toFixed(m < 10000 ? 1 : 0) + ' km';
}

async function openDossier() {
  const code = document.getElementById('code').value.trim();
  document.getElementById('fout').style.display = 'none';
  try {
    const antw = await fetch(SUPA_URL + '/rest/v1/rpc/hert_poll_dossier', {
      method: 'POST',
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ admin_code: code })
    });
    if (!antw.ok) throw new Error();
    const stemmen = await antw.json();
    document.getElementById('slot').style.display = 'none';
    document.getElementById('resultaten').style.display = 'block';

    // balken per keuze
    const per = { versus: [], mix: [], supporter: [] };
    stemmen.forEach(v => { if (per[v.choice]) per[v.choice].push(v); });
    const max = Math.max(1, ...Object.values(per).map(a => a.length));
    for (const k of ['versus', 'mix', 'supporter']) {
      document.getElementById('n-' + k).textContent = per[k].length;
      document.getElementById('b-' + k).style.width = (per[k].length / max * 100) + '%';
      document.getElementById('l-' + k).textContent = per[k].map(v => v.name).join(' · ');
    }

    // verdachte praktijken: zelfde toestel, meerdere stemmen / hergebruikte namen
    const perToestel = {};
    stemmen.forEach(v => {
      const sleutel = v.device_id || 'pre-detectie';
      (perToestel[sleutel] = perToestel[sleutel] || []).push(v);
    });
    const perNaam = {};
    stemmen.forEach(v => {
      const n = v.name.trim().toLowerCase();
      (perNaam[n] = perNaam[n] || []).push(v);
    });
    let verdacht = '';
    let toestelNr = 0;
    for (const [dev, votes] of Object.entries(perToestel)) {
      toestelNr++;
      if (dev !== 'pre-detectie' && votes.length > 1) {
        verdacht += `<div class="kaartje alarm"><span class="kop2">🚨 Toestel #${toestelNr} (${toestelNaam(votes[0].user_agent)}) stemde ${votes.length}×</span><br>` +
          votes.map(v => `als <b>"${esc(v.name)}"</b> → ${KEUZES[v.choice]} <span class="meta">(${tijd(v.created_at)})</span>`).join('<br>') +
          `</div>`;
      }
    }
    for (const [naam, votes] of Object.entries(perNaam)) {
      if (votes.length > 1) {
        const toestellen = new Set(votes.map(v => v.device_id || 'x'));
        verdacht += `<div class="kaartje"><span class="kop2">👥 De naam "${esc(votes[0].name)}" werd ${votes.length}× gebruikt</span> <span class="meta">(vanaf ${toestellen.size} toestel${toestellen.size > 1 ? 'len' : ''})</span><br>` +
          votes.map(v => `${KEUZES[v.choice]} <span class="meta">(${tijd(v.created_at)}, ${toestelNaam(v.user_agent)})</span>`).join('<br>') +
          `</div>`;
      }
    }
    const preDetectie = (perToestel['pre-detectie'] || []).length;
    if (preDetectie) verdacht += `<p class="leeg">${preDetectie} stem(men) van vóór de toesteldetectie — daarvoor is niets te bewijzen. Jammer.</p>`;
    document.getElementById('verdacht').innerHTML = verdacht || '<p class="leeg">Iedereen gedraagt zich. Verdacht op zich.</p>';

    // herkomst
    document.getElementById('herkomst').innerHTML = stemmen.map(v => {
      let plaats;
      if (v.lat != null) {
        plaats = `op <b>${afstand(v.lat, v.lon)}</b> van het café ` +
          `<a style="color:var(--amber)" href="https://www.openstreetmap.org/?mlat=${v.lat}&mlon=${v.lon}#map=16/${v.lat}/${v.lon}" target="_blank">kaart</a> ` +
          `<span class="meta">(±${v.loc_accuracy || '?'} m nauwkeurig)</span>`;
      } else if (v.loc_status === 'geweigerd') {
        plaats = '<span style="color:var(--rood)">🚩 locatie geweigerd — verdacht</span>';
      } else if (v.loc_status === 'niet beschikbaar') {
        plaats = '<span class="meta">locatie niet beschikbaar</span>';
      } else {
        plaats = '<span class="meta">niet gevraagd (oude stem)</span>';
      }
      return `<div class="kaartje"><span class="kop2">${esc(v.name)}</span> <span class="meta">(${tijd(v.created_at)})</span><br>${plaats}</div>`;
    }).join('') || '<p class="leeg">Nog geen verklaringen.</p>';

    // het gezeur
    const zeur = stemmen.filter(v => v.comment && v.comment.trim());
    document.getElementById('gezeur').innerHTML = zeur.length
      ? zeur.map(v => `<div class="zeur"><span class="wie">${esc(v.name)}</span> <span class="meta">(${KEUZES[v.choice]}, ${tijd(v.created_at)}, ${toestelNaam(v.user_agent)})</span><br><span class="wat">"${esc(v.comment)}"</span></div>`).join('')
      : '<p class="leeg">Nog geen gezeur. Dat komt nog.</p>';

    document.getElementById('totaal').textContent = stemmen.length + ' verklaring(en) in het dossier · ' + Object.keys(perToestel).length + ' toestel(len)';
  } catch (e) {
    document.getElementById('fout').style.display = 'block';
  }
}
</script>
</body>
</html>
